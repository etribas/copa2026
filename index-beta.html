  <style>
    :root{color-scheme:light dark;--bg:#f5f7fb;--card:#fff;--ink:#121826;--muted:#667085;--line:#e5e7ef;--ok:#128a46;--brand:#155eef;--brand2:#eff4ff;--shadow:0 8px 24px rgba(16,24,40,.08)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.35 system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;padding-bottom:96px}button,input{font:inherit}

.appbar{position:sticky;top:0;z-index:10;background:rgba(245,247,251,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:10px 12px}.title{display:flex;justify-content:flex-start;align-items:center;gap:12px;max-width:960px;margin:auto}.title h1{font-size:18px;margin:0}.pill{font-size:12px;color:var(--brand);background:var(--brand2);padding:5px 9px;border-radius:99px;font-weight:800;white-space:nowrap}
.searchbar{max-width:960px;margin:10px auto 0;position:relative}.searchbar input{width:100%;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:16px;padding:13px 14px;box-shadow:var(--shadow);font-size:16px}.searchbar .clear-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:18px;color:#667085;cursor:pointer;padding:4px 6px;display:none}.searchbar input:not(:placeholder-shown)~.clear-btn{display:block}.searchbar .clear-btn:hover{color:#344054}.stats{max-width:960px;margin:12px auto 0;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:9px 7px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s}.stat:hover{border-color:var(--brand)}.stat.active{border-color:var(--brand);background:var(--brand2)}.stat.active b{color:var(--brand)}.stat b{display:block;font-size:18px}.stat span{font-size:11px;color:var(--muted)}.tabs{max-width:960px;margin:12px auto 0;display:flex;gap:8px;overflow:auto;padding-bottom:2px;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:10px 13px;white-space:nowrap;font-weight:800;color:var(--ink)}.tab.active{background:var(--brand);border-color:var(--brand);color:#fff}
.menu-btn{border:1px solid var(--line);background:var(--card);border-radius:16px;padding:8px 10px;min-width:44px;height:44px;font-size:20px;font-weight:900;color:var(--ink);cursor:pointer}
.menu-btn.locked{background:var(--brand);border-color:var(--brand);color:#fff}
.menu-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:30;display:none}
.menu-overlay.active{display:block}
.menu-panel{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:24px 24px 0 0;box-shadow:0 -8px 32px rgba(0,0,0,.2);z-index:31;transform:translateY(100%);transition:transform .3s ease-out;max-height:85vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,0px)}
.menu-panel.active{transform:translateY(0)}
.menu-sheet-handle{width:36px;height:4px;background:var(--line);border-radius:2px;margin:12px auto 0}
.menu-sheet-title{font-size:16px;font-weight:800;text-align:center;padding:12px 16px 4px;color:var(--ink)}
.menu-sheet-list{list-style:none;margin:0;padding:4px 8px 8px}
.menu-sheet-item{display:flex;align-items:center;gap:14px;width:100%;border:none;background:none;padding:16px 12px;text-align:left;font-size:15px;font-weight:700;color:var(--ink);cursor:pointer;border-radius:14px}
.menu-sheet-item:hover{background:var(--line)}
.menu-sheet-item:active{background:var(--line)}
.menu-sheet-item svg{flex-shrink:0;color:var(--muted)}
.menu-sheet-footer{border-top:1px solid var(--line);padding:12px 16px;text-align:center;font-size:11px;color:var(--muted)}
.menu-sheet-info{display:flex;align-items:center;gap:14px;padding:16px 12px;font-size:13px;color:var(--muted);border-radius:14px}
.menu-sheet-info svg{flex-shrink:0}

    main{max-width:960px;margin:12px auto;padding:0 12px 28px}.hint{color:var(--muted);font-size:12px;margin:14px 2px}
.group-head{display:flex;justify-content:space-between;align-items:center;margin:18px 2px 8px;padding:8px 8px 8px 10px;border-radius:14px}.group-head h2{font-size:16px;margin:0}.group-actions{display:flex;gap:6px}.mini{border:1px solid var(--line);background:var(--card);border-radius:12px;padding:8px 9px;font-size:12px;font-weight:800;color:var(--ink)}
.team{background:var(--card);border:1px solid var(--line);border-radius:20px;margin:10px 0;box-shadow:var(--shadow);overflow:hidden}.team summary{list-style:none;cursor:pointer;padding:14px;display:flex;justify-content:space-between;align-items:center;gap:8px;font-weight:900}.team summary::-webkit-details-marker{display:none}.team-title{display:flex;align-items:center;gap:10px;min-width:0}.team-name{min-width:0}.team-name small{display:block;color:var(--muted);font-weight:700;margin-top:2px}.flag{width:34px;height:24px;border-radius:5px;object-fit:cover;box-shadow:0 0 0 1px rgba(0,0,0,.12);background:#f2f4f7;flex:0 0 auto}.flag.placeholder{display:grid;place-items:center;font-size:15px;font-weight:900;color:#667085}.badge{font-size:12px;color:#344054;background:#f2f4f7;border-radius:999px;padding:5px 8px;white-space:nowrap;cursor:pointer;user-select:none}
.team-actions{display:flex;gap:8px;padding:0 14px 12px}.team-actions button{flex:1;border:1px solid var(--line);background:var(--card);border-radius:14px;padding:10px;font-weight:800;color:var(--ink)}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:0 14px 14px}.sticker{min-height:44px;border:1px solid var(--line);border-radius:12px;background:var(--card);padding:6px 4px;text-align:center;font-weight:950;cursor:pointer;user-select:none;-webkit-touch-callout:none}.sticker.done{background:#eaf8ef;border-color:#a6dcb8;color:var(--ok)}.empty-msg{color:var(--muted);text-align:center;padding:28px 12px}
.fabbar{position:fixed;left:0;right:0;bottom:0;z-index:20;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:10px 8px calc(10px + env(safe-area-inset-bottom,0px));display:flex;justify-content:center;gap:6px}.fabbar button{border:1px solid var(--line);background:var(--card);border-radius:16px;width:56px;height:56px;min-width:44px;min-height:44px;font-size:22px;font-weight:900;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,transform .1s;color:var(--ink)}.fabbar button:hover{background:var(--line)}.fabbar button:active{transform:scale(.93)}.fabbar button.active{background:var(--brand);border-color:var(--brand);color:#fff}.fab-az{font-size:14px;letter-spacing:.5px}input[type=file]{display:none}.print-only{display:none}
    @media(min-width:620px){.grid{grid-template-columns:repeat(8,1fr)}.fabbar{max-width:720px;left:50%;transform:translateX(-50%);border:1px solid var(--line);border-bottom:0;border-radius:24px 24px 0 0}.title h1{font-size:22px}.stat b{font-size:22px}}
    @media(min-width:900px){body{padding-bottom:30px}.fabbar{position:sticky;bottom:10px;margin:18px auto;transform:none;left:auto;right:auto}.grid{grid-template-columns:repeat(10,1fr)}}
.toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(20px);background:#1a1f2e;color:#fff;border-radius:16px;padding:12px 16px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:12px;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:200;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;max-width:calc(100vw - 32px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.toast-undo{background:none;border:1px solid rgba(255,255,255,.35);border-radius:10px;color:#fff;padding:5px 10px;font-size:12px;font-weight:800;cursor:pointer;flex-shrink:0}
.toast-undo:hover{background:rgba(255,255,255,.15)}
    @media(min-width:900px){.toast{bottom:calc(90px + env(safe-area-inset-bottom,0px))}}
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1117; --card: #1a1f2e; --ink: #e8ecf4;
        --muted: #8895b3; --line: #2a3047; --brand2: #1a2a4a;
        --ok: #34d47e; --shadow: 0 8px 24px rgba(0,0,0,.3);
}
.appbar { background: rgba(15,17,23,.96); }
.fabbar { background: rgba(26,31,46,.96); }
.badge { background: var(--line); color: var(--ink); }
.sticker.done { background: #0d2b1a; border-color: #1d5c35; }
.flag.placeholder { background: var(--line); }
.searchbar input::placeholder { color: var(--muted); }
}

    @keyframes sticker-pop{0%{transform:scale(1)}40%{transform:scale(1.18)}70%{transform:scale(0.93)}100%{transform:scale(1)}}
    @keyframes sticker-uncheck{0%{transform:scale(1)}35%{transform:scale(0.88)}100%{transform:scale(1)}}
.sticker.anim-pop{animation:sticker-pop .3s ease-out}
.sticker.anim-uncheck{animation:sticker-uncheck .22s ease-out}
    @keyframes sticker-exit-missing{0%{opacity:1;transform:scale(1)}20%{opacity:1;transform:scale(1.1)}100%{opacity:0;transform:scale(.85)}}
.sticker.anim-exit-missing{animation:sticker-exit-missing 300ms ease-out forwards;pointer-events:none}
    @media(prefers-reduced-motion:reduce){.sticker.anim-exit-missing{animation:none;opacity:0}}
    @keyframes sticker-shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.sticker.anim-shake{animation:sticker-shake .35s ease-out}
    @media(prefers-reduced-motion:reduce){.sticker.anim-shake{animation:none}}
    @keyframes lock-pulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 0 5px rgba(21,94,239,.45)}}
.menu-btn.anim-lock-pulse{animation:lock-pulse .4s ease-out 3}
    @media(prefers-reduced-motion:reduce){.menu-btn.anim-lock-pulse{animation:none}}
.progress-track{height:4px;background:var(--line);margin-top:8px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;width:0%;background:var(--brand);border-radius:2px;transition:width .4s ease}
.confirm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:999;padding:16px}
.confirm-overlay.active{display:flex}
.confirm-box{background:var(--card);border-radius:16px;padding:20px;max-width:400px;width:100%;box-shadow:0 20px 25px rgba(0,0,0,.15)}
.confirm-box h2{margin:0 0 12px;font-size:16px;font-weight:700}
.confirm-box p{margin:0 0 20px;font-size:13px;color:var(--muted)}
.confirm-btns{display:flex;gap:8px}
.confirm-btns button{flex:1;border:none;border-radius:12px;padding:14px;font-weight:700;cursor:pointer;font-size:13px}
.confirm-cancel{background:var(--line);color:var(--ink)}
.confirm-ok{background:var(--brand);color:#fff}
    @media print{
      @page{size:A4 portrait;margin:6mm}
      body{background:white;font-size:8px;padding:0}
.appbar,main,.fabbar{display:none!important}
.print-only{display:block!important;color:#000}
      #printArea{column-count:1}
.print-title{font-size:12px;font-weight:800;margin:0 0 4px}
.print-sub{font-size:8px;margin:0 0 5px}
.print-group{display:flex;gap:6px;align-items:stretch;background:#fff;border:2px solid #000;border-radius:4px;padding:.8mm;margin:.8mm 0;break-inside:avoid;page-break-inside:avoid}
.group-letter{width:18mm;min-width:18mm;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px}
.group-rows{flex:1}
.print-row{display:grid;grid-template-columns:28mm 1fr;gap:1.2mm;border-bottom:.2pt solid #ddd;padding:.5mm 0;break-inside:avoid;page-break-inside:avoid}
.print-team{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:8px;display:inline-flex;align-items:center;gap:2px;line-height:1}
.print-team img{width:9px;height:auto;vertical-align:text-bottom;flex-shrink:0}
.print-missing{word-spacing:.8mm;font-size:7.2px;line-height:1.2}
.empty{color:#666}
}

    html[data-theme="dark"]{color-scheme:dark;--bg:#0f1117;--card:#1a1f2e;--ink:#e8ecf4;--muted:#8895b3;--line:#2a3047;--brand2:#1a2a4a;--ok:#34d47e;--shadow:0 8px 24px rgba(0,0,0,.3)}
    html[data-theme="dark"] .appbar{background:rgba(15,17,23,.96)}
    html[data-theme="dark"] .fabbar{background:rgba(26,31,46,.96)}
    html[data-theme="dark"] .badge{background:var(--line);color:var(--ink)}
    html[data-theme="dark"] .sticker.done{background:#0d2b1a;border-color:#1d5c35}
    html[data-theme="dark"] .flag.placeholder{background:var(--line)}
    html[data-theme="dark"] .searchbar input::placeholder{color:var(--muted)}
    html[data-theme="light"]{color-scheme:light;--bg:#f5f7fb;--card:#fff;--ink:#121826;--muted:#667085;--line:#e5e7ef;--ok:#128a46;--brand:#155eef;--brand2:#eff4ff;--shadow:0 8px 24px rgba(16,24,40,.08)}
    html[data-theme="light"] .appbar{background:rgba(245,247,251,.96)}
    html[data-theme="light"] .fabbar{background:rgba(255,255,255,.96)}
    html[data-theme="light"] .badge{background:#f2f4f7;color:#344054}
    html[data-theme="light"] .sticker.done{background:#eaf8ef;border-color:#a6dcb8}
    html[data-theme="light"] .flag.placeholder{background:#f2f4f7}
    #fabSortToggle{flex-direction:column;gap:1px;padding:6px}
.sort-label{font-size:9px;font-weight:700;line-height:1;white-space:nowrap;text-align:center}
.group-chip{font-size:10px;font-weight:800;padding:3px 7px;border-radius:999px;white-space:nowrap}
.team{position:relative}
@keyframes ctry-pulse{0%,100%{box-shadow:var(--shadow)}45%{box-shadow:0 0 0 3px rgba(18,138,70,.42),var(--shadow)}}
.ctry-pulse{animation:ctry-pulse 1.4s ease-in-out}
@media(prefers-reduced-motion:reduce){.ctry-pulse{animation:none}}
@keyframes ctry-msg{0%{opacity:0;transform:scale(.82)}18%{opacity:1;transform:scale(1.05)}28%{transform:scale(1)}78%{opacity:1}100%{opacity:0;transform:scale(.95)}}
.ctry-cel{position:absolute;inset:0;z-index:5;pointer-events:none;overflow:hidden;display:flex;align-items:center;justify-content:center}
.ctry-msg{background:rgba(18,138,70,.92);color:#fff;border-radius:12px;padding:10px 20px;font-size:15px;font-weight:800;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:ctry-msg 3.2s ease-in-out forwards;white-space:nowrap}
@media(prefers-reduced-motion:reduce){.ctry-msg{animation:none;opacity:0}}
@keyframes fw-spark{0%{transform:rotate(var(--a)) translateX(0) scale(1);opacity:1}70%{opacity:.8}100%{transform:rotate(var(--a)) translateX(var(--d)) scale(0);opacity:0}}
.fw-burst{position:absolute;left:var(--bx);top:var(--by);width:0;height:0}
.fw-spark{position:absolute;width:5px;height:5px;border-radius:50%;background:var(--pc);box-shadow:0 0 5px 1px var(--pc);transform-origin:0 0;animation:fw-spark var(--dur) var(--del) cubic-bezier(.1,0,.7,1) forwards;opacity:0}
@media(prefers-reduced-motion:reduce){.fw-spark{display:none}}
.grid{position:relative}
.ctry-wm{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:0;user-select:none;font-size:88px;line-height:1;opacity:.07}

.sticker-tooltip{position:fixed;z-index:300;background:#1a1f2e;color:#fff;border-radius:10px;padding:5px 9px;font-size:11px;font-weight:700;pointer-events:none;max-width:160px;text-align:center;line-height:1.3;box-shadow:0 4px 16px rgba(0,0,0,.35);opacity:0;transform:translateY(4px) scale(.9);transition:opacity .15s,transform .15s;will-change:opacity,transform}
.sticker-tooltip.show{opacity:1;transform:translateY(0) scale(1)}
.sticker-tooltip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1a1f2e}
.sticker-tooltip.tip-below::after{display:none}
.sticker-tooltip.tip-below::before{content:'';position:absolute;bottom:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-bottom-color:#1a1f2e}
.fabbar button{position:relative}
#fabHistory{display:none}
#fabHistory.has-history{display:flex}
.fab-badge{position:absolute;top:-5px;right:-5px;background:var(--brand);color:#fff;border-radius:99px;font-size:9px;font-weight:800;min-width:15px;height:15px;display:flex;align-items:center;justify-content:center;padding:0 3px;pointer-events:none;line-height:1}
.hist-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:14px}
.hist-item:hover{background:var(--line)}

  <header class="appbar">

// ─── Gesto de arrastar para baixo para fechar menus ──────────────────────────
function addDragToClose(panel, closeFn) {
  let startY = 0, currentY = 0, dragging = false;
  const THRESHOLD = 80; // px para confirmar fechamento

  function onTouchStart(e) {
    // Só inicia se o toque começou na área do handle ou no topo do panel
    // e o painel não está rolado para baixo
    if (panel.scrollTop > 0) return;
    startY = e.touches[0].clientY;
    currentY = startY;
    dragging = true;
    // Remove transição durante o drag para movimento fluido
    panel.style.transition = 'none';
  }

  function onTouchMove(e) {
    if (!dragging) return;
    currentY = e.touches[0].clientY;
    const deltaY = currentY - startY;
    if (deltaY < 0) {
      // Não permite arrastar para cima
      panel.style.transform = 'translateY(0)';
      return;
    }
    // Se o painel estiver rolado, não inicia o drag
    if (panel.scrollTop > 0) {
      dragging = false;
      panel.style.transform = 'translateY(0)';
      return;
    }
    e.preventDefault();
    panel.style.transform = `translateY(${deltaY}px)`;
  }

  function onTouchEnd() {
    if (!dragging) return;
    dragging = false;
    const deltaY = currentY - startY;
    // Restaura transição
    panel.style.transition = '';
    if (deltaY >= THRESHOLD) {
      // Deslizou o suficiente: fecha
      panel.style.transform = 'translateY(100%)';
      setTimeout(closeFn, 300);
    } else {
      // Não deslizou o suficiente: volta ao lugar
      panel.style.transform = 'translateY(0)';
    }
  }

  panel.addEventListener('touchstart', onTouchStart, { passive: true });
  panel.addEventListener('touchmove', onTouchMove, { passive: false });
  panel.addEventListener('touchend', onTouchEnd, { passive: true });
}

function filteredItems(){const q=norm($('q').value);return stickers.filter(x=>(activeGroup==='Todos'||x.grupo===activeGroup)&&itemMatches(x,q)&&(filterMode==='all'||(filterMode==='missing'&&!isDone(x.id))||(filterMode==='done'&&isDone(x.id))))}
function allVisibleTeamKeys(){const q=norm($('q').value);const items=filteredItems();return GRUPOS.flatMap(g=>g.secoes.map(sec=>({g,sec}))).filter(({g,sec})=>(activeGroup==='Todos'||g.grupo===activeGroup)&&items.some(x=>x.grupo===g.grupo&&x.secao===sec.nome)).map(({g,sec})=>`${g.grupo}|${sec.prefixo}`)}

function isTeamOpen(key, grupo, q){return closedTeams.has(key)?false:openTeams.has(key)||!!q||activeGroup!=='Todos'||grupo==='Página inicial'}

function updateStats(){const done=stickers.filter(x=>isDone(x.id)).length;const pct=Math.round(done/stickers.length*100);$('total').textContent=stickers.length;$('done').textContent=done;$('missing').textContent=stickers.length-done;$('pct').textContent=pct+'%';$('progressFill').style.width=pct+'%'}

function exportCsv(){const rows=[['id','grupo','secao','prefixo','numero','colada'],...stickers.map(x=>[x.id,x.grupo,x.secao,x.prefixo,x.numero,isDone(x.id)?1:0])];const csv=rows.map(r=>r.map(v=>'"'+String(v).replaceAll('"','""')+'"').join(',')).join('\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='figurinhas-copa-2026.csv';a.click();URL.revokeObjectURL(a.href)}

function parseLine(line){const out=[];let cur='',quoted=false;for(let i=0;i<line.length;i++){const ch=line[i],nx=line[i+1];if(ch==='"'&&quoted&&nx==='"'){cur+='"';i++}else if(ch==='"')quoted=!quoted;else if((ch===','||ch===';')&&!quoted){out.push(cur.trim());cur=''}else cur+=ch}out.push(cur.trim());return out.map(v=>v.replace(/^"|"$/g,'').replaceAll('""','"'))}

async function importCsv(text){if(!await showConfirmModal('Importar backup','Importar CSV pode marcar ou desmarcar várias figurinhas. Continuar?'))return;const lines=text.split(/\r?\n/).filter(x=>x.trim());if(!lines.length)return;const h=parseLine(lines.shift()).map(norm);const id=h.indexOf('id'),pre=h.indexOf('prefixo'),num=h.indexOf('numero'),col=h.indexOf('colada');lines.forEach(line=>{const c=parseLine(line);let sid=id>=0?c[id]:'';if(!sid&&pre>=0&&num>=0)sid=`${c[pre]}-${c[num]}`;if(!stickers.some(x=>x.id===sid))return;setDone(sid,['1','sim','s','true','x','colada','yes','y'].includes(norm(c[col])))});save();render()}

function buildPrint(){
  const allFwcMiss = stickers.filter(x=>x.prefixo==='FWC'&&!isDone(x.id)).map(x=>stickerLabel(x));
  let fwcRendered = false;
  const html = GRUPOS.map(g=>{
    const m = (g.grupo||'').match(/Grupo\s+([A-Z])/i);
    const groupLetter = m ? m[1].toUpperCase() : (g.grupo?g.grupo.charAt(0).toUpperCase():'');
    const rows = [];
    g.secoes.forEach(sec=>{
      if(sec.prefixo==='FWC'){
        if(fwcRendered) return;
        fwcRendered = true;
        const miss = allFwcMiss;
        const emoji = FLAG_EMOJIS[sec.prefixo] || '★';
        const teamLabel = `${emoji} FWC`;
        rows.push(`<div class="print-row"><div class="print-team">${teamLabel}</div><div class="print-missing ${miss.length?'':'empty'}">${miss.length?esc(miss.join(' ')):'Completa'}</div></div>`);
        return;
      }
      const miss = stickers.filter(x=>x.grupo===g.grupo&&x.secao===sec.nome&&!isDone(x.id)).map(x=>stickerLabel(x));
      const emoji = FLAG_EMOJIS[sec.prefixo] || '★';
      const teamLabel = sec.prefixo==='CC' ? esc(sec.nome) : `${emoji} ${esc(sec.nome)}`;
      rows.push(`<div class="print-row"><div class="print-team">${teamLabel}</div><div class="print-missing ${miss.length?'':'empty'}">${miss.length?esc(miss.join(' ')):'Completa'}</div></div>`);
    });
    if(!rows.length) return '';
    return `<div class="print-group"><div class="group-letter">${esc(groupLetter)}</div><div class="group-rows">${rows.join('')}</div></div>`;
  }).join('');
  $('printArea').innerHTML=`<div class="print-title">Figurinhas faltantes — Copa 2026</div><p class="print-sub">Ordem por grupos. Gerado em ${new Date().toLocaleDateString('pt-BR')}.</p>${html}`
}

function generateShareLink(){
  const byPrefix={};
  stickers.filter(x=>isDone(x.id)).forEach(x=>{if(!byPrefix[x.prefixo])byPrefix[x.prefixo]=[];byPrefix[x.prefixo].push(+x.numero)});
  if(!Object.keys(byPrefix).length){showToast('Marque algumas figurinhas para compartilhar');return null}
  const data=JSON.stringify(byPrefix);
  const encoded=btoa(data).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  return `${window.location.origin}${window.location.pathname}#d=${encoded}`
}

function shareLink(){
  const url=generateShareLink();
  if(!url)return;
  const fallback=()=>navigator.clipboard.writeText(url).then(()=>showToast('✓ Link copiado!')).catch(()=>showToast('Erro ao copiar link'));
  if(navigator.share){navigator.share({title:'Meu álbum Copa 2026 🏆',url}).catch(e=>{if(e.name!=='AbortError')fallback()})}
  else{fallback()}
}

function generateStickerText(type){const isMissing=type==='missing';const parts=[isMissing?'Oi! Aqui estão minhas figurinhas faltantes da Copa 2026 ⚽🏆':'Oi! Aqui estão minhas figurinhas coladas da Copa 2026 ⚽🏆'];GRUPOS.forEach(g=>g.secoes.forEach(sec=>{const items=stickers.filter(x=>x.prefixo===sec.prefixo&&x.secao===sec.nome);const filtered=items.filter(x=>isMissing?!isDone(x.id):isDone(x.id));if(!filtered.length)return;const emoji=FLAG_EMOJIS[sec.prefixo]||'★';parts.push(emoji+' '+sec.nome+'\n'+sec.prefixo+'-'+filtered.map(x=>x.numero).join('-'))}));return parts.join('\n')}

function shareStickersByType(type){
  const text=generateStickerText(type);
  const title=type==='missing'?'Figurinhas Faltantes - Copa 2026':'Figurinhas Coladas - Copa 2026';
  const fallback=()=>navigator.clipboard.writeText(text).then(()=>showToast('✓ Texto copiado!')).catch(()=>showToast('Erro ao copiar'));
  if(navigator.share){navigator.share({title,text}).catch(e=>{if(e.name!=='AbortError')fallback()})}
  else{fallback()}
}

let _toastTimer=null;

function showToast(msg,undoFn){
  let el=document.querySelector('.toast');
  if(el){clearTimeout(_toastTimer);el.remove()}
  el=document.createElement('div');
  el.className='toast';
  el.innerHTML=`<span>${msg}</span>${undoFn?`<button class="toast-undo">Desfazer</button>`:''}`;
  document.body.appendChild(el);
  if(undoFn)el.querySelector('.toast-undo').onclick=()=>{undoFn();el.remove();clearTimeout(_toastTimer)};
  requestAnimationFrame(()=>el.classList.add('show'));
  _toastTimer=setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),220)},4000);
}

const HISTORY_KEY='figurinhas-action-history';
const MAX_HISTORY=5;
const actionHistory=lsGetJson(HISTORY_KEY,[]).slice(0,MAX_HISTORY);

function saveHistory(){lsSet(HISTORY_KEY,JSON.stringify(actionHistory))}

function pushHistory(id,label,wasDone){
  actionHistory.unshift({id,label,wasDone});
  if(actionHistory.length>MAX_HISTORY)actionHistory.pop();
  saveHistory();
  updateHistoryBtn();
}

function updateHistoryBtn(){
  const btn=$('fabHistory');
  if(!btn)return;
  const count=actionHistory.length;
  btn.classList.toggle('has-history',count>0);
  const badge=$('fabHistoryBadge');
  if(badge)badge.textContent=count;
}

function showHistoryPanel(){
  if(!actionHistory.length)return;
  const overlay=document.createElement('div');
  overlay.className='menu-overlay';
  const panel=document.createElement('div');
  panel.className='menu-panel';
  panel.setAttribute('role','dialog');
  panel.setAttribute('aria-modal','true');
  panel.setAttribute('aria-label','Histórico de ações');

  function renderItems(){
    return actionHistory.map((a,i)=>{
      const icon=a.wasDone
        ?'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
        :'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#128a46" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="8 12 11 15 16 9"/></svg>';
      const action=a.wasDone?'desmarcada':'colada';
      const player=PLAYER_NAMES[a.id]?`<small style="display:block;color:var(--muted);font-weight:600;font-size:11px">${esc(PLAYER_NAMES[a.id])} · ${action}</small>`:`<small style="display:block;color:var(--muted);font-weight:600;font-size:11px">${action}</small>`;
      return `<li><div class="hist-item"><span style="flex-shrink:0;display:flex;align-items:center">${icon}</span><span style="flex:1"><span style="font-weight:800;font-size:14px">${esc(a.label)}</span>${player}</span><button class="mini hist-revert-btn" data-hist-idx="${i}">Reverter</button></div></li>`;
    }).join('');
  }

  panel.innerHTML=`<div class="menu-sheet-handle"></div><div class="menu-sheet-title">Últimas ações</div><ul class="menu-sheet-list" id="histList">${renderItems()}</ul>`;
  overlay.appendChild(panel);

  const onKeydown=e=>{if(e.key==='Escape')close()};
  overlay._onKeydown=onKeydown;
  document.addEventListener('keydown',onKeydown);
  overlay.onclick=e=>{if(e.target===overlay)close()};
  document.body.appendChild(overlay);

  function close(){document.removeEventListener('keydown',overlay._onKeydown);overlay.classList.remove('active');panel.classList.remove('active');setTimeout(()=>overlay.remove(),300)}

  requestAnimationFrame(()=>{
    overlay.classList.add('active');
    panel.classList.add('active');
    addDragToClose(panel,close);
    const list=panel.querySelector('#histList');
    list.onclick=e=>{
      const btn=e.target.closest('.hist-revert-btn');
      if(!btn)return;
      const idx=+btn.dataset.histIdx;
      const entry=actionHistory[idx];
      if(!entry)return;
      actionHistory.splice(idx,1);
      saveHistory();
      setDone(entry.id,entry.wasDone);
      save();
      render();
      updateHistoryBtn();
      showToast(`${entry.label} revertida`);
      if(!actionHistory.length){close()}else{list.innerHTML=renderItems()}
    };
  });
}

function isCountryComplete(prefixo){return stickers.filter(x=>x.prefixo===prefixo).every(x=>isDone(x.id))}

function celebrateCountryComplete(prefixo){
  const teamEl=document.querySelector(`.team[data-key$="|${prefixo}"]`);
  if(!teamEl)return;
  const reduced=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  teamEl.classList.add('ctry-pulse');
  teamEl.addEventListener('animationend',()=>teamEl.classList.remove('ctry-pulse'),{once:true});
  const cel=document.createElement('div');
  cel.className='ctry-cel';
  if(!reduced){
    const COLORS=['#f7b731','#ff4757','#2ed573','#1e90ff','#eccc68','#ff6b81','#a29bfe','#fff'];
    const W=teamEl.offsetWidth||300;const H=teamEl.offsetHeight||160;
    [{x:W*.22,y:H*.45,del:0},{x:W*.78,y:H*.38,del:.28},{x:W*.5,y:H*.42,del:.52}].forEach(b=>{
      const burst=document.createElement('div');
      burst.className='fw-burst';
      burst.style.cssText=`--bx:${b.x.toFixed(0)}px;--by:${b.y.toFixed(0)}px`;
      for(let i=0;i<14;i++){const p=document.createElement('span');p.className='fw-spark';const angle=(360/14*i+Math.random()*10).toFixed(1);const dist=(48+Math.random()*36).toFixed(0);const dur=(.55+Math.random()*.25).toFixed(2);p.style.cssText=`--a:${angle}deg;--d:${dist}px;--pc:${COLORS[i%COLORS.length]};--dur:${dur}s;--del:${b.del.toFixed(2)}s`;burst.appendChild(p)}
      cel.appendChild(burst);
    });
  }
  const msg=document.createElement('div');
  msg.className='ctry-msg';
  msg.textContent='🏆 Seleção completa!';
  cel.appendChild(msg);
  teamEl.appendChild(cel);
  setTimeout(()=>cel.remove(),3500);
}

function toggleSticker(id,label){
  if(isLocked){
    const btn=document.querySelector(`.sticker[data-id="${id}"]`);
    if(btn){btn.classList.add('anim-shake');btn.addEventListener('animationend',()=>btn.classList.remove('anim-shake'),{once:true})}
    const lockBtn=$('lockBtn');
    if(lockBtn){lockBtn.classList.remove('anim-lock-pulse');void lockBtn.offsetWidth;lockBtn.classList.add('anim-lock-pulse');lockBtn.addEventListener('animationend',()=>lockBtn.classList.remove('anim-lock-pulse'),{once:true})}
    showToast('🔒 Álbum bloqueado');
    return;
  }
  const wasDone=isDone(id);
  const stickerPfx=stickers.find(x=>x.id===id)?.prefixo;
  const wasComplete=stickerPfx?isCountryComplete(stickerPfx):true;
  if(!wasDone&&filterMode==='missing'){
    const btn=document.querySelector(`.sticker[data-id="${id}"]`);
    if(btn){
      setDone(id,true);
      btn.classList.add('done');
      btn.setAttribute('aria-label',`${label} – colada`);
      let settled=false;
      const finish=()=>{if(settled)return;settled=true;save();if(!wasComplete&&stickerPfx&&isCountryComplete(stickerPfx)){celebrateCountryComplete(stickerPfx);setTimeout(render,900)}else{render()}};
      showToast(`${label} colada`,()=>{settled=true;setDone(id,false);save();render()});
      if(window.matchMedia('(prefers-reduced-motion:reduce)').matches){finish()}
      else{btn.classList.add('anim-exit-missing');btn.addEventListener('animationend',finish,{once:true});setTimeout(finish,400)}
      pushHistory(id,label,wasDone);return;
    }
  }
  setDone(id,!wasDone);
  save();
  render();
  if(!wasDone&&!wasComplete&&stickerPfx&&isCountryComplete(stickerPfx))requestAnimationFrame(()=>celebrateCountryComplete(stickerPfx));
  const btn=document.querySelector(`.sticker[data-id="${id}"]`);
  if(btn){const cls=wasDone?'anim-uncheck':'anim-pop';btn.classList.add(cls);btn.addEventListener('animationend',()=>btn.classList.remove(cls),{once:true})}
  showToast(wasDone?`${label} desmarcada`:`${label} colada`,()=>{setDone(id,wasDone);save();render()});
  pushHistory(id,label,wasDone);
}

async function loadFromLink(){
  const hash=window.location.hash.substring(1);
  if(!hash.startsWith('d='))return;
  const encoded=hash.substring(2);
  try{
    const padded=encoded.replace(/-/g,'+').replace(/_/g,'/');
    const padding=(4-(padded.length%4))%4;
    const data=JSON.parse(atob(padded+'='.repeat(padding)));
    if(await showConfirmModal('Carregar álbum','Carregar este link substituirá seu album local. Deseja continuar?')){
      state.clear();
      actionHistory.length=0;saveHistory();updateHistoryBtn();
      filterMode='all';lsSet(FILTER_KEY,'all');renderFilterButtons();
      activeGroup='Todos';lsSet(GROUP_KEY,'Todos');
      Object.entries(data).forEach(([prefixo,numeros])=>{numeros.forEach(numero=>{state.add(`${prefixo}-${numero}`)})});
      save();
      render();
      window.history.replaceState({},'',window.location.pathname);
      showToast('✓ Album carregado com sucesso!');
    }else{
      window.history.replaceState({},'',window.location.pathname);
    }
  }catch(e){
    console.error('Erro ao carregar link:',e);
    showToast('Erro ao processar link');
  }
}

  panel.innerHTML=`<div class="menu-sheet-handle"></div><div class="menu-sheet-title">Compartilhar</div><ul class="menu-sheet-list"><li><button class="menu-sheet-item" id="_sm_miss"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/><line x1="9" y1="11" x2="11" y2="11"/></svg>Figurinhas Faltantes</button></li><li><button class="menu-sheet-item" id="_sm_link"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>Álbum - Link de recuperação</button></li><li><button class="menu-sheet-item" id="_sm_app"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>App</button></li></ul>`;
  overlay.appendChild(panel);
  const onKeydown=e=>{if(e.key==='Escape')close()};
  overlay._onKeydown=onKeydown;
  document.addEventListener('keydown',onKeydown);
  overlay.onclick=e=>{if(e.target===overlay)close()};
  document.body.appendChild(overlay);
  function close(){document.removeEventListener('keydown',overlay._onKeydown);overlay.classList.remove('active');panel.classList.remove('active');setTimeout(()=>overlay.remove(),300)}
  requestAnimationFrame(()=>{overlay.classList.add('active');panel.classList.add('active');addDragToClose(panel,close);setTimeout(()=>{
    document.getElementById('_sm_miss').onclick=()=>{close();shareStickersByType('missing')};

function shareApp(){
  const url='https://etribas.github.io/copa2026/';
  const fallback=()=>navigator.clipboard.writeText(url).then(()=>showToast('✓ Link copiado!')).catch(()=>showToast('Erro ao copiar link'));
  if(navigator.share){navigator.share({title:'Figurinhas Copa 2026',text:'Controle sua coleção de figurinhas da Copa do Mundo 2026.',url}).catch(e=>{if(e.name!=='AbortError')fallback()})}
  else{fallback()}
}

// ─── Long-press: mostrar nome do jogador ─────────────────────────────────────
let _lpTimer=null,_lpTooltip=null,_lpMoved=false;

function _hideStickerTooltip(){
  if(_lpTimer){clearTimeout(_lpTimer);_lpTimer=null}
  if(_lpTooltip){
    const tt=_lpTooltip;_lpTooltip=null;
    tt.classList.remove('show');
    setTimeout(()=>tt.remove(),160);
  }
}

function _showStickerTooltip(btn,name){
  _hideStickerTooltip();
  const tt=document.createElement('div');
  tt.className='sticker-tooltip';
  tt.textContent=name;
  document.body.appendChild(tt);
  _lpTooltip=tt;
  requestAnimationFrame(()=>{
    const r=btn.getBoundingClientRect();
    const tw=tt.offsetWidth,th=tt.offsetHeight;
    const cx=r.left+r.width/2;
    let top=r.top-th-10;
    let below=false;
    if(top<6){top=r.bottom+10;below=true}
    if(below)tt.classList.add('tip-below');
    tt.style.left=Math.max(6,Math.min(cx-tw/2,window.innerWidth-tw-6))+'px';
    tt.style.top=Math.max(6,top)+'px';
    tt.classList.add('show');
  });
}

$('album').addEventListener('pointerdown',e=>{
  const btn=e.target.closest('.sticker');
  if(!btn)return;
  const id=btn.dataset.id;
  const num=id.split('-').pop();
  let name=PLAYER_NAMES[id];
  if(!name){
    if(num==='1')name='Escudo';
    else if(num==='13')name='Seleção';
    else return;
  }
  _lpMoved=false;
  _lpTimer=setTimeout(()=>{_lpTimer=null;_showStickerTooltip(btn,name)},620);
},{passive:true});

$('album').addEventListener('pointermove',e=>{
  if(!_lpTimer&&!_lpTooltip)return;
  if(Math.abs(e.movementX)+Math.abs(e.movementY)>3){
    _lpMoved=true;
    if(_lpTimer){clearTimeout(_lpTimer);_lpTimer=null}
  }
},{passive:true});

$('album').addEventListener('pointerup',()=>{if(!_lpMoved)_hideStickerTooltip();else{_lpMoved=false;_hideStickerTooltip()}},{passive:true});
$('album').addEventListener('pointercancel',_hideStickerTooltip,{passive:true});
$('album').addEventListener('contextmenu',e=>{if(e.target.closest('.sticker'))e.preventDefault();});

// PWA Installation Handler
let deferredPrompt;
const installPromptId='installPrompt'+Math.random().toString(36).slice(2);

window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  deferredPrompt=e;
  showInstallPrompt();
});

function showInstallPrompt(){
  if(!deferredPrompt)return;
  const id=installPromptId;
  const html=`<div id="${id}" style="position:fixed;bottom:80px;left:12px;right:12px;background:#155eef;color:#fff;border-radius:16px;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:25;max-width:400px;margin:0 auto"><div style="display:flex;gap:12px;align-items:center"><div style="flex:1"><div style="font-weight:700;font-size:14px;margin-bottom:4px">Instalar aplicativo</div><div style="font-size:12px;opacity:.9">Acesse seu álbum sem internet</div></div><button id="installBtn${id}" style="background:#fff;color:#155eef;border:none;border-radius:10px;padding:8px 14px;font-weight:700;cursor:pointer;font-size:12px;white-space:nowrap">Instalar</button><button id="closePromptBtn${id}" style="background:transparent;color:#fff;border:none;font-size:18px;cursor:pointer;padding:0;width:24px;height:24px;display:flex;align-items:center;justify-content:center">✕</button></div></div>`;
  const container=document.createElement('div');
  container.innerHTML=html;
  document.body.appendChild(container);
  $('installBtn'+id).onclick=async()=>{deferredPrompt.prompt();const result=await deferredPrompt.userChoice;if(result.outcome==='accepted'){console.log('App installed')}else{console.log('User dismissed')}deferredPrompt=null;container.remove()};
  $('closePromptBtn'+id).onclick=()=>{container.remove()};
}

window.addEventListener('appinstalled',()=>{console.log('PWA installed');deferredPrompt=null});

// register service worker for PWA
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js').then(reg=>{
    console.log('Service worker registered', reg);
  }).catch(err=>console.warn('Service worker failed', err));
}

render();
</script>
