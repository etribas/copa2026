<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="./icon-from-jpeg-192.png" sizes="192x192" type="image/png">
  <meta name="theme-color" content="#155eef">
  <meta name="mobile-web-app-capable" content="yes">
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--ink:#121826;--muted:#667085;--line:#e5e7ef;--ok:#128a46;--brand:#155eef;--brand2:#eff4ff;--shadow:0 8px 24px rgba(16,24,40,.08)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.35 system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;padding-bottom:96px}button,input{font:inherit}
    .appbar{position:sticky;top:0;z-index:10;background:rgba(245,247,251,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:10px 12px}.title{display:flex;justify-content:space-between;align-items:center;gap:10px;max-width:960px;margin:auto}.title h1{font-size:18px;margin:0}.pill{font-size:12px;color:var(--brand);background:var(--brand2);padding:5px 9px;border-radius:99px;font-weight:800;white-space:nowrap}
    .searchbar{max-width:960px;margin:10px auto 0}.searchbar input{width:100%;border:1px solid var(--line);background:#fff;border-radius:16px;padding:13px 14px;box-shadow:var(--shadow)}.stats{max-width:960px;margin:12px auto 0;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:9px 7px;text-align:center}.stat b{display:block;font-size:18px}.stat span{font-size:11px;color:var(--muted)}.sortbar{max-width:960px;margin:12px auto 0;display:flex;gap:8px;flex-wrap:wrap}.sortbar button{border:1px solid var(--line);background:#fff;border-radius:12px;padding:9px 12px;font-size:12px;font-weight:800;color:#344054;cursor:pointer}.sortbar button.active{background:var(--brand);border-color:var(--brand);color:#fff}.tabs{max-width:960px;margin:12px auto 0;display:flex;gap:8px;overflow:auto;padding-bottom:2px;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 13px;white-space:nowrap;font-weight:800;color:#344054}.tab.active{background:var(--brand);border-color:var(--brand);color:#fff}
    main{max-width:960px;margin:12px auto;padding:0 12px 28px}.hint{color:var(--muted);font-size:12px;margin:14px 2px}
    .group-head{display:flex;justify-content:space-between;align-items:center;margin:18px 2px 8px;padding:8px 8px 8px 10px;border-radius:14px}.group-head h2{font-size:16px;margin:0}.group-actions{display:flex;gap:6px}.mini{border:1px solid var(--line);background:#fff;border-radius:12px;padding:8px 9px;font-size:12px;font-weight:800;color:#344054}
    .team{background:var(--card);border:1px solid var(--line);border-radius:20px;margin:10px 0;box-shadow:var(--shadow);overflow:hidden}.team summary{list-style:none;cursor:pointer;padding:14px;display:flex;justify-content:space-between;align-items:center;gap:8px;font-weight:900}.team summary::-webkit-details-marker{display:none}.team-title{display:flex;align-items:center;gap:10px;min-width:0}.team-name{min-width:0}.team-name small{display:block;color:var(--muted);font-weight:700;margin-top:2px}.flag{width:34px;height:24px;border-radius:5px;object-fit:cover;box-shadow:0 0 0 1px rgba(0,0,0,.12);background:#f2f4f7;flex:0 0 auto}.flag.placeholder{display:grid;place-items:center;font-size:15px;font-weight:900;color:#667085}.badge{font-size:12px;color:#344054;background:#f2f4f7;border-radius:999px;padding:5px 8px;white-space:nowrap}
    .team-actions{display:flex;gap:8px;padding:0 14px 12px}.team-actions button{flex:1;border:1px solid var(--line);background:#fff;border-radius:14px;padding:10px;font-weight:800;color:#344054}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;padding:0 14px 14px}.sticker{min-height:58px;border:1px solid var(--line);border-radius:16px;background:#fff;padding:8px 6px;text-align:center;font-weight:950;cursor:pointer}.sticker small{display:block;margin-top:3px;font-size:10px;color:var(--muted);font-weight:750}.sticker.done{background:#eaf8ef;border-color:#a6dcb8;color:var(--ok)}.empty-msg{color:var(--muted);text-align:center;padding:28px 12px}
    .fabbar{position:fixed;left:0;right:0;bottom:0;z-index:20;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:10px 8px calc(10px + env(safe-area-inset-bottom,0px));display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.fabbar button,.fabbar label{border:1px solid var(--line);background:#fff;border-radius:16px;padding:9px 4px;min-height:54px;font-size:11px;font-weight:900;text-align:center;cursor:pointer}.fabbar .primary{background:var(--brand);color:#fff;border-color:var(--brand)}input[type=file]{display:none}.print-only{display:none}
    @media(min-width:620px){.grid{grid-template-columns:repeat(8,1fr)}.fabbar{max-width:720px;left:50%;transform:translateX(-50%);border:1px solid var(--line);border-bottom:0;border-radius:24px 24px 0 0}.title h1{font-size:22px}.stat b{font-size:22px}}
    @media(min-width:900px){body{padding-bottom:30px}.fabbar{position:sticky;bottom:10px;margin:18px auto;transform:none;left:auto;right:auto}.grid{grid-template-columns:repeat(10,1fr)}}
    @media print{
      @page{size:A4 portrait;margin:6mm}
      body{background:white;font-size:8px;padding:0}
      .appbar,main,.fabbar{display:none!important}
      .print-only{display:block!important;color:#000}
      #printArea{column-count:1}
      .print-title{font-size:12px;font-weight:800;margin:0 0 4px}
      .print-sub{font-size:8px;margin:0 0 5px}
      .print-group{display:flex;gap:6px;align-items:stretch;background:#fff;border:2px solid #000;border-radius:4px;padding:.8mm;margin:.8mm 0;break-inside:avoid;page-break-inside:avoid}
      .group-letter{width:18mm;min-width:18mm;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px}
      .group-rows{flex:1}
      .print-row{display:grid;grid-template-columns:28mm 1fr;gap:1.2mm;border-bottom:.2pt solid #ddd;padding:.5mm 0;break-inside:avoid;page-break-inside:avoid}
      .print-team{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:8px;display:inline-flex;align-items:center;gap:2px;line-height:1}
      .print-team img{width:9px;height:auto;vertical-align:text-bottom;flex-shrink:0}
      .print-missing{word-spacing:.8mm;font-size:7.2px;line-height:1.2}
      .empty{color:#666}
    }
  </style>
</head>
<body>
  <header class="appbar">
    <div class="title"><h1>Figurinhas Copa 2026</h1><span class="pill" id="progressPill">0%</span></div>
    <div class="searchbar"><input id="q" placeholder="Buscar grupo, sele├з├гo ou figurinha. Ex: BRA1" autocomplete="off"></div>
    <div class="stats"><div class="stat"><b id="total">0</b><span>Total</span></div><div class="stat"><b id="done">0</b><span>Coladas</span></div><div class="stat"><b id="missing">0</b><span>Faltam</span></div><div class="stat"><b id="pct">0%</b><span>Progresso</span></div></div>

  <main>

  </nav>
  <section class="print-only" id="printArea"></section>

<script>
const n=(ini,fim)=>Array.from({length:fim-ini+1},(_,i)=>String(ini+i));
const GRUPOS=[
  {grupo:'Grupo A',secoes:[{nome:'M├йxico',prefixo:'MEX',numeros:n(1,20)},{nome:'├Бfrica do Sul',prefixo:'RSA',numeros:n(1,20)},{nome:'Cor├йia do Sul',prefixo:'KOR',numeros:n(1,20)},{nome:'Rep. Tcheca',prefixo:'CZE',numeros:n(1,20)}]},
  {grupo:'Grupo B',secoes:[{nome:'Canad├б',prefixo:'CAN',numeros:n(1,20)},{nome:'B├│snia',prefixo:'BIH',numeros:n(1,20)},{nome:'Catar',prefixo:'QAT',numeros:n(1,20)},{nome:'Su├н├зa',prefixo:'SUI',numeros:n(1,20)}]},
  {grupo:'Grupo C',secoes:[{nome:'Brasil',prefixo:'BRA',numeros:n(1,20)},{nome:'Marrocos',prefixo:'MAR',numeros:n(1,20)},{nome:'Haiti',prefixo:'HAI',numeros:n(1,20)},{nome:'Esc├│cia',prefixo:'SCO',numeros:n(1,20)}]},
  {grupo:'Grupo D',secoes:[{nome:'Estados Unidos',prefixo:'USA',numeros:n(1,20)},{nome:'Paraguai',prefixo:'PAR',numeros:n(1,20)},{nome:'Austr├бlia',prefixo:'AUS',numeros:n(1,20)},{nome:'Turquia',prefixo:'TUR',numeros:n(1,20)}]},
  {grupo:'Grupo E',secoes:[{nome:'Alemanha',prefixo:'GER',numeros:n(1,20)},{nome:'Cura├зao',prefixo:'CUW',numeros:n(1,20)},{nome:'Costa do Marfim',prefixo:'CIV',numeros:n(1,20)},{nome:'Equador',prefixo:'ECU',numeros:n(1,20)}]},
  {grupo:'Grupo F',secoes:[{nome:'Holanda',prefixo:'NED',numeros:n(1,20)},{nome:'Jap├гo',prefixo:'JPN',numeros:n(1,20)},{nome:'Su├йcia',prefixo:'SWE',numeros:n(1,20)},{nome:'Tun├нsia',prefixo:'TUN',numeros:n(1,20)}]},
  {grupo:'Grupo G',secoes:[{nome:'B├йlgica',prefixo:'BEL',numeros:n(1,20)},{nome:'Egito',prefixo:'EGY',numeros:n(1,20)},{nome:'Ir├г',prefixo:'IRN',numeros:n(1,20)},{nome:'Nova Zel├вndia',prefixo:'NZL',numeros:n(1,20)}]},
  {grupo:'Grupo H',secoes:[{nome:'Espanha',prefixo:'ESP',numeros:n(1,20)},{nome:'Cabo Verde',prefixo:'CPV',numeros:n(1,20)},{nome:'Ar├бbia Saudita',prefixo:'KSA',numeros:n(1,20)},{nome:'Uruguai',prefixo:'URU',numeros:n(1,20)}]},
  {grupo:'Grupo I',secoes:[{nome:'Fran├зa',prefixo:'FRA',numeros:n(1,20)},{nome:'Senegal',prefixo:'SEN',numeros:n(1,20)},{nome:'Iraque',prefixo:'IRQ',numeros:n(1,20)},{nome:'Noruega',prefixo:'NOR',numeros:n(1,20)}]},
  {grupo:'Grupo J',secoes:[{nome:'Argentina',prefixo:'ARG',numeros:n(1,20)},{nome:'Arg├йlia',prefixo:'ALG',numeros:n(1,20)},{nome:'├Бustria',prefixo:'AUT',numeros:n(1,20)},{nome:'Jord├вnia',prefixo:'JOR',numeros:n(1,20)}]},
  {grupo:'Grupo K',secoes:[{nome:'Portugal',prefixo:'POR',numeros:n(1,20)},{nome:'Congo',prefixo:'COD',numeros:n(1,20)},{nome:'Uzbequist├гo',prefixo:'UZB',numeros:n(1,20)},{nome:'Col├┤mbia',prefixo:'COL',numeros:n(1,20)}]},
  {grupo:'Grupo L',secoes:[{nome:'Inglaterra',prefixo:'ENG',numeros:n(1,20)},{nome:'Cro├бcia',prefixo:'CRO',numeros:n(1,20)},{nome:'Gana',prefixo:'GHA',numeros:n(1,20)},{nome:'Panam├б',prefixo:'PAN',numeros:n(1,20)}]},
  {grupo:'Extras',secoes:[{nome:'FIFA World Cup',prefixo:'FWC',numeros:n(0,19)},{nome:'Figurinhas da Coca-Cola',prefixo:'CC',numeros:n(1,14)}]}
];
const FLAGS={MEX:'mx',RSA:'za',KOR:'kr',CZE:'cz',CAN:'ca',BIH:'ba',QAT:'qa',SUI:'ch',BRA:'br',MAR:'ma',HAI:'ht',SCO:'gb-sct',USA:'us',PAR:'py',AUS:'au',TUR:'tr',GER:'de',CUW:'cw',CIV:'ci',ECU:'ec',NED:'nl',JPN:'jp',SWE:'se',TUN:'tn',BEL:'be',EGY:'eg',IRN:'ir',NZL:'nz',ESP:'es',CPV:'cv',KSA:'sa',URU:'uy',FRA:'fr',SEN:'sn',IRQ:'iq',NOR:'no',ARG:'ar',ALG:'dz',AUT:'at',JOR:'jo',POR:'pt',COD:'cd',UZB:'uz',COL:'co',ENG:'gb-eng',CRO:'hr',GHA:'gh',PAN:'pa'};
const FLAG_EMOJIS={MEX:'ЁЯЗ▓ЁЯЗ╜',RSA:'ЁЯЗ┐ЁЯЗж',KOR:'ЁЯЗ░ЁЯЗ╖',CZE:'ЁЯЗиЁЯЗ┐',CAN:'ЁЯЗиЁЯЗж',BIH:'ЁЯЗзЁЯЗж',QAT:'ЁЯЗ╢ЁЯЗж',SUI:'ЁЯЗиЁЯЗн',BRA:'ЁЯЗзЁЯЗ╖',MAR:'ЁЯЗ▓ЁЯЗж',HAI:'ЁЯЗнЁЯЗ╣',SCO:'ЁЯП┤ґаБзґаБвґаБ│ґаБгґаБ┤ґаБ┐',USA:'ЁЯЗ║ЁЯЗ╕',PAR:'ЁЯЗ╡ЁЯЗ╛',AUS:'ЁЯЗжЁЯЗ║',TUR:'ЁЯЗ╣ЁЯЗ╖',GER:'ЁЯЗйЁЯЗк',CUW:'ЁЯЗиЁЯЗ╝',CIV:'ЁЯЗиЁЯЗо',ECU:'ЁЯЗкЁЯЗи',NED:'ЁЯЗ│ЁЯЗ▒',JPN:'ЁЯЗпЁЯЗ╡',SWE:'ЁЯЗ╕ЁЯЗк',TUN:'ЁЯЗ╣ЁЯЗ│',BEL:'ЁЯЗзЁЯЗк',EGY:'ЁЯЗкЁЯЗм',IRN:'ЁЯЗоЁЯЗ╖',NZL:'ЁЯЗ│ЁЯЗ┐',ESP:'ЁЯЗкЁЯЗ╕',CPV:'ЁЯЗиЁЯЗ╗',KSA:'ЁЯЗ╕ЁЯЗж',URU:'ЁЯЗ║ЁЯЗ╛',FRA:'ЁЯЗлЁЯЗ╖',SEN:'ЁЯЗ╕ЁЯЗ│',IRQ:'ЁЯЗоЁЯЗ╢',NOR:'ЁЯЗ│ЁЯЗ┤',ARG:'ЁЯЗжЁЯЗ╖',ALG:'ЁЯЗйЁЯЗ┐',AUT:'ЁЯЗжЁЯЗ╣',JOR:'ЁЯЗпЁЯЗ┤',POR:'ЁЯЗ╡ЁЯЗ╣',COD:'ЁЯЗиЁЯЗй',UZB:'ЁЯЗ║ЁЯЗ┐',COL:'ЁЯЗиЁЯЗ┤',ENG:'ЁЯП┤ґаБзґаБвґаБеґаБоґаБзґаБ┐',CRO:'ЁЯЗнЁЯЗ╖',GHA:'ЁЯЗмЁЯЗн',PAN:'ЁЯЗ╡ЁЯЗж',FWC:'тнР',CC:''}
const GROUP_COLORS=['#155eef','#7a5af8','#dd2590','#eaaa08','#12b76a','#06aed4','#f79009','#f04438','#6172f3','#9e77ed','#17b26a','#2e90fa','#667085','#344054'];
const STORAGE_KEY='figurinhas-copa-2026-mobile-v4';
const saved=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
const state=new Set(saved);
const openTeams=new Set();
const closedTeams=new Set();
const stickers=GRUPOS.flatMap((g,ordemGrupo)=>g.secoes.flatMap((s,ordemSecao)=>s.numeros.map((numero,ordem)=>({id:`${s.prefixo}-${numero}`,grupo:g.grupo,secao:s.nome,prefixo:s.prefixo,numero,ordemGrupo,ordemSecao,ordem}))));
let activeGroup='Todos';
let sortMode = localStorage.getItem('figurinhas-sort-mode') || 'group';
const $=id=>document.getElementById(id);
const stickerLabel=x=>`${x.prefixo}${x.numero}`;
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function norm(v){return String(v||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}
function flagHtml(prefixo){const code=FLAGS[prefixo];return code?`<img class="flag" src="https://flagcdn.com/${code}.svg" alt="Bandeira ${prefixo}" loading="lazy">`:`<span class="flag placeholder">тШЕ</span>`}
function groupColor(grupo){const i=GRUPOS.findIndex(g=>g.grupo===grupo);return GROUP_COLORS[Math.max(0,i)%GROUP_COLORS.length]}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify([...state]));updateStats();renderTabs()}
function isDone(id){return state.has(id)}
function setDone(id,done){done?state.add(id):state.delete(id)}
function confirmBatch(msg){return confirm(msg||'Confirmar altera├з├гo em v├бrias figurinhas?')}
function itemMatches(x,q){return !q||norm(x.grupo).includes(q)||norm(x.secao).includes(q)||norm(x.prefixo).includes(q)||norm(x.numero).includes(q)||norm(x.id).includes(q)||norm(`${x.prefixo} ${x.numero}`).includes(q)||norm(stickerLabel(x)).includes(q)}
function filteredItems(){const q=norm($('q').value);return stickers.filter(x=>(activeGroup==='Todos'||x.grupo===activeGroup)&&itemMatches(x,q))}
function allVisibleTeamKeys(){const q=norm($('q').value);const items=filteredItems();return GRUPOS.flatMap(g=>g.secoes.map(sec=>({g,sec}))).filter(({g,sec})=>(activeGroup==='Todos'||g.grupo===activeGroup)&&items.some(x=>x.grupo===g.grupo&&x.secao===sec.nome)).map(({g,sec})=>`${g.grupo}|${sec.prefixo}`)}
function renderTabs(){const tabsEl=$('tabs');if(!tabsEl)return;const tabs=['Todos',...GRUPOS.map(g=>g.grupo)];tabsEl.innerHTML=tabs.map(t=>`<button class="tab ${t===activeGroup?'active':''}" data-g="${esc(t)}">${esc(t)}</button>`).join('');document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{activeGroup=b.dataset.g;render();window.scrollTo({top:0,behavior:'smooth'})})}
function renderSortButtons(){if(!$('sortGroup'))return;$('sortGroup').classList.toggle('active',sortMode==='group');$('sortAlpha').classList.toggle('active',sortMode==='alpha')}
function setSortMode(mode){sortMode=mode;localStorage.setItem('figurinhas-sort-mode',mode);renderSortButtons();render()}
function syncSectionState(){document.querySelectorAll('details.team').forEach(d=>{const key=d.dataset.key;if(openTeams.has(key)||closedTeams.has(key))return;if(d.open){openTeams.add(key);closedTeams.delete(key)}else{openTeams.delete(key);closedTeams.add(key)}})}
function isTeamOpen(key, grupo, q){return closedTeams.has(key)?false:openTeams.has(key)||!!q||activeGroup!=='Todos'||grupo==='P├бgina inicial'}
function render(){
  renderTabs();
  syncSectionState();
  const album=$('album');
  const q=norm($('q').value);
  album.innerHTML='';
  const itemsNow=filteredItems();
  let shown=0;

  if(sortMode==='alpha'){
    const sections = GRUPOS.filter(g=>activeGroup==='Todos'||g.grupo===activeGroup)
      .flatMap(g=>g.secoes.map(sec=>({grupo:g.grupo,sec})))
      .sort((a,b)=>a.sec.nome.localeCompare(b.sec.nome,'pt',{sensitivity:'base'}));

    sections.forEach(({grupo,sec})=>{
      const teamItems = itemsNow.filter(x=>x.secao===sec.nome);
      if(!teamItems.length) return;
      shown += teamItems.length;
      const col = teamItems.filter(x=>isDone(x.id)).length;
      const key = `${grupo}|${sec.prefixo}`;
      const d = document.createElement('details');
      d.className='team';
      d.dataset.key=key;
      d.open = isTeamOpen(key, grupo, q);
      d.ontoggle = ()=>{if(d.open){openTeams.add(key);closedTeams.delete(key)}else{openTeams.delete(key);closedTeams.add(key)}};
      d.innerHTML = `<summary><span class="team-title">${flagHtml(sec.prefixo)}<span class="team-name">${esc(sec.nome)}<small>${esc(sec.prefixo)}</small></span></span><span class="badge">${col}/${teamItems.length}</span></summary>`;
      const actions = document.createElement('div');
      actions.className='team-actions';
      actions.innerHTML = '<button>Marcar se├з├гo</button><button>Limpar se├з├гo</button>';
      actions.children[0].onclick = ()=>{if(!confirmBatch(`Marcar todas as ${teamItems.length} figurinhas de ${sec.nome}?`))return;teamItems.forEach(x=>setDone(x.id,true));save();render()};
      actions.children[1].onclick = ()=>{if(!confirmBatch(`Desmarcar todas as ${teamItems.length} figurinhas de ${sec.nome}?`))return;teamItems.forEach(x=>setDone(x.id,false));save();render()};
      d.appendChild(actions);
      const grid = document.createElement('div');
      grid.className='grid';
      teamItems.forEach(x=>{const b=document.createElement('button');b.className='sticker'+(isDone(x.id)?' done':'');b.innerHTML=`${esc(stickerLabel(x))}<small>${isDone(x.id)?'colada':'faltante'}</small>`;b.onclick=()=>{setDone(x.id,!isDone(x.id));save();render()};grid.appendChild(b)});
      d.appendChild(grid);
      album.appendChild(d);
    });
  } else {
    const groups = GRUPOS.filter(g=>activeGroup==='Todos'||g.grupo===activeGroup);
    groups.forEach(g=>{
      const groupItems = itemsNow.filter(x=>x.grupo===g.grupo);
      if(!groupItems.length) return;
      shown += groupItems.length;
      const gd = groupItems.filter(x=>isDone(x.id)).length;
      const head = document.createElement('div');
      head.className='group-head';
      head.style.borderLeft=`8px solid ${groupColor(g.grupo)}`;
      head.style.background=`linear-gradient(90deg, ${groupColor(g.grupo)}18, transparent)`;
      head.innerHTML=`<h2>${esc(g.grupo)} <span class="badge">${gd}/${groupItems.length}</span></h2><div class="group-actions"><button class="mini" data-a="mark">Marcar</button><button class="mini" data-a="clear">Limpar</button></div>`;
      head.querySelector('[data-a="mark"]').onclick=()=>{if(!confirmBatch(`Marcar todas as ${groupItems.length} figurinhas de ${g.grupo}?`))return;groupItems.forEach(x=>setDone(x.id,true));save();render()};
      head.querySelector('[data-a="clear"]').onclick=()=>{if(!confirmBatch(`Desmarcar todas as ${groupItems.length} figurinhas de ${g.grupo}?`))return;groupItems.forEach(x=>setDone(x.id,false));save();render()};
      album.appendChild(head);
      const sections = g.secoes;
      sections.forEach(sec=>{
        const teamItems=groupItems.filter(x=>x.secao===sec.nome);
        if(!teamItems.length) return;
        const col = teamItems.filter(x=>isDone(x.id)).length;
        const key = `${g.grupo}|${sec.prefixo}`;
        const d = document.createElement('details');
        d.className='team';
        d.dataset.key=key;
        d.open = isTeamOpen(key, g.grupo, q);
        d.ontoggle = ()=>{if(d.open){openTeams.add(key);closedTeams.delete(key)}else{openTeams.delete(key);closedTeams.add(key)}};
        d.innerHTML=`<summary><span class="team-title">${flagHtml(sec.prefixo)}<span class="team-name">${esc(sec.nome)}<small>${esc(sec.prefixo)}</small></span></span><span class="badge">${col}/${teamItems.length}</span></summary>`;
        const actions = document.createElement('div');
        actions.className='team-actions';
        actions.innerHTML = '<button>Marcar se├з├гo</button><button>Limpar se├з├гo</button>';
        actions.children[0].onclick = ()=>{if(!confirmBatch(`Marcar todas as ${teamItems.length} figurinhas de ${sec.nome}?`))return;teamItems.forEach(x=>setDone(x.id,true));save();render()};
        actions.children[1].onclick = ()=>{if(!confirmBatch(`Desmarcar todas as ${teamItems.length} figurinhas de ${sec.nome}?`))return;teamItems.forEach(x=>setDone(x.id,false));save();render()};
        d.appendChild(actions);
        const grid = document.createElement('div');
        grid.className='grid';
        teamItems.forEach(x=>{const b=document.createElement('button');b.className='sticker'+(isDone(x.id)?' done':'');b.innerHTML=`${esc(stickerLabel(x))}<small>${isDone(x.id)?'colada':'faltante'}</small>`;b.onclick=()=>{setDone(x.id,!isDone(x.id));save();render()};grid.appendChild(b)});
        d.appendChild(grid);
        album.appendChild(d);
      });
    });
  }

  if(!shown) album.innerHTML='<div class="empty-msg">Nenhuma figurinha encontrada.</div>';
  updateStats();
}
function updateStats(){const done=stickers.filter(x=>isDone(x.id)).length;const pct=Math.round(done/stickers.length*100);$('total').textContent=stickers.length;$('done').textContent=done;$('missing').textContent=stickers.length-done;$('pct').textContent=pct+'%';$('progressPill').textContent=pct+'% completo'}
function exportCsv(){const rows=[['id','grupo','secao','prefixo','numero','colada'],...stickers.map(x=>[x.id,x.grupo,x.secao,x.prefixo,x.numero,isDone(x.id)?1:0])];const csv=rows.map(r=>r.map(v=>'"'+String(v).replaceAll('"','""')+'"').join(',')).join('\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='figurinhas-copa-2026.csv';a.click();URL.revokeObjectURL(a.href)}
function parseLine(line){const out=[];let cur='',quoted=false;for(let i=0;i<line.length;i++){const ch=line[i],nx=line[i+1];if(ch==='"'&&quoted&&nx==='"'){cur+='"';i++}else if(ch==='"')quoted=!quoted;else if((ch===','||ch===';')&&!quoted){out.push(cur.trim());cur=''}else cur+=ch}out.push(cur.trim());return out.map(v=>v.replace(/^"|"$/g,'').replaceAll('""','"'))}
function importCsv(text){if(!confirmBatch('Importar CSV pode marcar ou desmarcar v├бrias figurinhas. Continuar?'))return;const lines=text.split(/\r?\n/).filter(x=>x.trim());if(!lines.length)return;const h=parseLine(lines.shift()).map(norm);const id=h.indexOf('id'),pre=h.indexOf('prefixo'),num=h.indexOf('numero'),col=h.indexOf('colada');lines.forEach(line=>{const c=parseLine(line);let sid=id>=0?c[id]:'';if(!sid&&pre>=0&&num>=0)sid=`${c[pre]}-${c[num]}`;if(!stickers.some(x=>x.id===sid))return;setDone(sid,['1','sim','s','true','x','colada','yes','y'].includes(norm(c[col])))});save();render()}
function buildPrint(){
  const allFwcMiss = stickers.filter(x=>x.prefixo==='FWC'&&!isDone(x.id)).map(x=>stickerLabel(x));
  let fwcRendered = false;
  const html = GRUPOS.map(g=>{
    const m = (g.grupo||'').match(/Grupo\s+([A-Z])/i);
    const groupLetter = m ? m[1].toUpperCase() : (g.grupo?g.grupo.charAt(0).toUpperCase():'');
    const rows = [];
    g.secoes.forEach(sec=>{
      if(sec.prefixo==='FWC'){
        if(fwcRendered) return;
        fwcRendered = true;
        const miss = allFwcMiss;
        const emoji = FLAG_EMOJIS[sec.prefixo] || 'тШЕ';
        const teamLabel = `${emoji} FWC`;
        rows.push(`<div class="print-row"><div class="print-team">${teamLabel}</div><div class="print-missing ${miss.length?'':'empty'}">${miss.length?esc(miss.join(' ')):'Completa'}</div></div>`);
        return;
      }
      const miss = stickers.filter(x=>x.grupo===g.grupo&&x.secao===sec.nome&&!isDone(x.id)).map(x=>stickerLabel(x));
      const emoji = FLAG_EMOJIS[sec.prefixo] || 'тШЕ';
      const teamLabel = sec.prefixo==='CC' ? esc(sec.nome) : `${emoji} ${esc(sec.nome)}`;
      rows.push(`<div class="print-row"><div class="print-team">${teamLabel}</div><div class="print-missing ${miss.length?'':'empty'}">${miss.length?esc(miss.join(' ')):'Completa'}</div></div>`);
    });
    if(!rows.length) return '';
    return `<div class="print-group"><div class="group-letter">${esc(groupLetter)}</div><div class="group-rows">${rows.join('')}</div></div>`;
  }).join('');
  $('printArea').innerHTML=`<div class="print-title">Figurinhas faltantes тАФ Copa 2026</div><p class="print-sub">Ordem por grupos. Gerado em ${new Date().toLocaleDateString('pt-BR')}.</p>${html}`
}
function generateShareLink(){
  const byPrefix={};
  stickers.filter(x=>isDone(x.id)).forEach(x=>{if(!byPrefix[x.prefixo])byPrefix[x.prefixo]=[];byPrefix[x.prefixo].push(+x.numero)});
  if(!Object.keys(byPrefix).length){alert('Marque algumas figurinhas para compartilhar');return null}
  const data=JSON.stringify(byPrefix);
  const encoded=btoa(data).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  return `${window.location.origin}${window.location.pathname}#d=${encoded}`
}
function shareLink(){
  const url=generateShareLink();
  if(!url)return;
  if(navigator.share){
    navigator.share({title:'├Бlbum Copa 2026',text:'Veja meu ├бlbum de figurinhas da Copa 2026! ЁЯПЖ',url:url}).catch(()=>{showShareModal(url)})
  }else{
    showShareModal(url);
  }
}
function showShareModal(url){
  const id='shareModal'+Math.random().toString(36).slice(2);
  const html=`<div id="${id}" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px"><div style="background:#fff;border-radius:16px;padding:20px;max-width:400px;width:100%;box-shadow:0 20px 25px rgba(0,0,0,.15)"><h2 style="margin:0 0 12px;font-size:16px;font-weight:700">Compartilhar ├Бlbum</h2><p style="margin:0 0 20px;font-size:13px;color:#667085">Escolha como compartilhar seu ├бlbum:</p><div style="display:flex;gap:8px;margin-bottom:8px"><button id="copyBtn${id}" style="flex:1;background:#155eef;color:#fff;border:none;border-radius:12px;padding:14px;font-weight:700;cursor:pointer;font-size:13px">ЁЯУЛ Copiar Link</button><button id="whatsappBtn${id}" style="flex:1;background:#25d366;color:#fff;border:none;border-radius:12px;padding:14px;font-weight:700;cursor:pointer;font-size:13px">ЁЯТм WhatsApp</button></div><button id="closeBtn${id}" style="width:100%;background:#f2f4f7;border:none;border-radius:12px;padding:12px;font-weight:700;cursor:pointer;font-size:13px">Fechar</button></div></div>`;
  const container=document.createElement('div');
  container.innerHTML=html;
  document.body.appendChild(container);
  $('copyBtn'+id).onclick=()=>{navigator.clipboard.writeText(url).then(()=>{alert('тЬУ Link copiado!')}).catch(()=>{alert('Erro ao copiar')});container.remove()};
  $('whatsappBtn'+id).onclick=()=>{const msg='Meu ├бlbum Copa 2026 ЁЯПЖ\n'+url;window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`,'_blank');container.remove()};
  $('closeBtn'+id).onclick=()=>container.remove();
}
function loadFromLink(){
  const hash=window.location.hash.substring(1);
  if(!hash.startsWith('d='))return;
  const encoded=hash.substring(2);
  try{
    const padded=encoded.replace(/-/g,'+').replace(/_/g,'/');
    const padding=(4-(padded.length%4))%4;
    const data=JSON.parse(atob(padded+'='.repeat(padding)));
    if(confirm('тЪая╕П Aviso: Carregar este link substituir├б suas figurinhas locais. Deseja continuar?')){
      state.clear();
      Object.entries(data).forEach(([prefixo,numeros])=>{numeros.forEach(numero=>{state.add(`${prefixo}-${numero}`)})});
      save();
      render();
      window.history.replaceState({},'',window.location.pathname);
      alert('тЬУ Figurinhas carregadas com sucesso!');
    }else{
      window.history.replaceState({},'',window.location.pathname);
    }
  }catch(e){
    console.error('Erro ao carregar link:',e);
    alert('Erro ao processar link');
  }
}
$('q').oninput=render;$('shareBtn').onclick=shareLink;$('exportCsv').onclick=exportCsv;$('importCsv').onchange=e=>{const f=e.target.files[0];if(f)f.text().then(importCsv);e.target.value=''};$('printMissing').onclick=()=>{buildPrint();window.print()};$('expandAll').onclick=()=>{const keys=allVisibleTeamKeys();keys.forEach(key=>{openTeams.add(key);closedTeams.delete(key)});render()};$('collapseAll').onclick=()=>{const keys=allVisibleTeamKeys();keys.forEach(key=>{openTeams.delete(key);closedTeams.add(key)});render()};$('sortGroup').onclick=()=>setSortMode('group');$('sortAlpha').onclick=()=>setSortMode('alpha');renderSortButtons();$('moreBtn').onclick=()=>{const a=prompt('Digite: 1 para marcar tudo, 2 para limpar tudo');if(a==='1'){if(!confirmBatch(`Marcar todas as ${stickers.length} figurinhas?`))return;stickers.forEach(x=>setDone(x.id,true));save();render()}if(a==='2'){if(!confirmBatch('Desmarcar todas as figurinhas?'))return;state.clear();save();render()}};

loadFromLink();

// register service worker for PWA
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js').then(reg=>{
    console.log('Service worker registered', reg);
  }).catch(err=>console.warn('Service worker failed', err));
}
