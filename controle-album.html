<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Figurinhas Copa 2026 ..</title>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--ink:#121826;--muted:#667085;--line:#e5e7ef;--ok:#128a46;--brand:#155eef;--brand2:#eff4ff;--shadow:0 8px 24px rgba(16,24,40,.08)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.35 system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;padding-bottom:96px}button,input{font:inherit}
    .appbar{position:sticky;top:0;z-index:10;background:rgba(245,247,251,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:10px 12px}.title{display:flex;justify-content:space-between;align-items:center;gap:10px;max-width:960px;margin:auto}.title h1{font-size:18px;margin:0}.pill{font-size:12px;color:var(--brand);background:var(--brand2);padding:5px 9px;border-radius:99px;font-weight:800;white-space:nowrap}
    .searchbar{max-width:960px;margin:10px auto 0}.searchbar input{width:100%;border:1px solid var(--line);background:#fff;border-radius:16px;padding:13px 14px;box-shadow:var(--shadow)}.stats{max-width:960px;margin:12px auto 0;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:9px 7px;text-align:center}.stat b{display:block;font-size:18px}.stat span{font-size:11px;color:var(--muted)}
    .tabs{max-width:960px;margin:12px auto 0;display:flex;gap:8px;overflow:auto;padding-bottom:2px;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 13px;white-space:nowrap;font-weight:800;color:#344054}.tab.active{background:var(--brand);border-color:var(--brand);color:#fff}
    main{max-width:960px;margin:12px auto;padding:0 12px 28px}.quick-add{display:flex;gap:8px;margin:12px 0}.quick-add input{flex:1;border:1px solid var(--line);border-radius:16px;background:#fff;padding:12px}.quick-add button{border:1px solid var(--brand);background:var(--brand);color:#fff;border-radius:16px;padding:0 12px;font-weight:900}.hint{color:var(--muted);font-size:12px;margin:14px 2px}
    .group-head{display:flex;justify-content:space-between;align-items:center;margin:18px 2px 8px;padding:8px 8px 8px 10px;border-radius:14px}.group-head h2{font-size:16px;margin:0}.group-actions{display:flex;gap:6px}.mini{border:1px solid var(--line);background:#fff;border-radius:12px;padding:8px 9px;font-size:12px;font-weight:800;color:#344054}
    .team{background:var(--card);border:1px solid var(--line);border-radius:20px;margin:10px 0;box-shadow:var(--shadow);overflow:hidden}.team summary{list-style:none;cursor:pointer;padding:14px;display:flex;justify-content:space-between;align-items:center;gap:8px;font-weight:900}.team summary::-webkit-details-marker{display:none}.team-title{display:flex;align-items:center;gap:10px;min-width:0}.team-name{min-width:0}.team-name small{display:block;color:var(--muted);font-weight:700;margin-top:2px}.flag{width:34px;height:24px;border-radius:5px;object-fit:cover;box-shadow:0 0 0 1px rgba(0,0,0,.12);background:#f2f4f7;flex:0 0 auto}.flag.placeholder{display:grid;place-items:center;font-size:15px;font-weight:900;color:#667085}.badge{font-size:12px;color:#344054;background:#f2f4f7;border-radius:999px;padding:5px 8px;white-space:nowrap}
    .team-actions{display:flex;gap:8px;padding:0 14px 12px}.team-actions button{flex:1;border:1px solid var(--line);background:#fff;border-radius:14px;padding:10px;font-weight:800;color:#344054}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;padding:0 14px 14px}.sticker{min-height:58px;border:1px solid var(--line);border-radius:16px;background:#fff;padding:8px 6px;text-align:center;font-weight:950;cursor:pointer}.sticker small{display:block;margin-top:3px;font-size:10px;color:var(--muted);font-weight:750}.sticker.done{background:#eaf8ef;border-color:#a6dcb8;color:var(--ok)}.empty-msg{color:var(--muted);text-align:center;padding:28px 12px}
    .fabbar{position:fixed;left:0;right:0;bottom:0;z-index:20;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:10px 8px calc(10px + env(safe-area-inset-bottom,0px));display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.fabbar button,.fabbar label{border:1px solid var(--line);background:#fff;border-radius:16px;padding:9px 4px;min-height:54px;font-size:11px;font-weight:900;text-align:center;cursor:pointer}.fabbar .primary{background:var(--brand);color:#fff;border-color:var(--brand)}input[type=file]{display:none}.print-only{display:none}
    @media(min-width:620px){.grid{grid-template-columns:repeat(8,1fr)}.fabbar{max-width:720px;left:50%;transform:translateX(-50%);border:1px solid var(--line);border-bottom:0;border-radius:24px 24px 0 0}.title h1{font-size:22px}.stat b{font-size:22px}}
    @media(min-width:900px){body{padding-bottom:30px}.fabbar{position:sticky;bottom:10px;margin:18px auto;transform:none;left:auto;right:auto}.grid{grid-template-columns:repeat(10,1fr)}}
    @media print{@page{size:A4 portrait;margin:7mm}body{background:white;font-size:8.2px;padding:0}.appbar,main,.fabbar{display:none!important}.print-only{display:block!important;color:#000}.print-title{font-size:14px;font-weight:800;margin:0 0 3px}.print-sub{font-size:8px;margin:0 0 4px}.print-group{font-weight:800;background:#eee;border:.4pt solid #ccc;padding:.8mm 1mm;margin-top:1mm}.print-row{display:grid;grid-template-columns:31mm 1fr;gap:2mm;border-bottom:.35pt solid #ddd;padding:.75mm 0;break-inside:avoid}.print-team{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.print-missing{word-spacing:1.2mm}.empty{color:#666}}
  </style>
</head>
<body>
  <header class="appbar">
    <div class="title"><h1>Figurinhas Copa 2026</h1><span class="pill" id="progressPill">0%</span></div>
    <div class="searchbar"><input id="q" placeholder="Buscar grupo, seleção ou figurinha. Ex: BRA1" autocomplete="off"></div>
    <div class="stats"><div class="stat"><b id="total">0</b><span>Total</span></div><div class="stat"><b id="done">0</b><span>Coladas</span></div><div class="stat"><b id="missing">0</b><span>Faltam</span></div><div class="stat"><b id="pct">0%</b><span>Progresso</span></div></div>
    <nav class="tabs" id="tabs"></nav>
  </header>

  <main>
    <div class="quick-add"><input id="quick" placeholder="Marcar várias: BRA1, BRA2, FWC8"><button id="quickBtn">OK</button></div>
    <p class="hint">Toque em uma figurinha para alternar. Ações em lote pedem confirmação. Exportar CSV serve como backup.</p>
    <div id="album"></div>
  </main>

  <nav class="fabbar">
    <button class="primary" id="printMissing">Imprimir<br>faltantes</button>
    <button id="exportCsv">Exportar<br>CSV</button>
    <label>Importar<br>CSV<input id="importCsv" type="file" accept=".csv,text/csv"></label>
    <button id="toggleSections">Abrir/<br>fechar</button>
    <button id="moreBtn">Mais<br>ações</button>
  </nav>
  <section class="print-only" id="printArea"></section>

<script>
const n=(ini,fim)=>Array.from({length:fim-ini+1},(_,i)=>String(ini+i));
const GRUPOS=[
  {grupo:'Página inicial',secoes:[{nome:'FIFA World Cup',prefixo:'FWC',numeros:n(0,8)}]},
  {grupo:'Grupo A',secoes:[{nome:'México',prefixo:'MEX',numeros:n(1,20)},{nome:'África do Sul',prefixo:'RSA',numeros:n(1,20)},{nome:'Coréia do Sul',prefixo:'KOR',numeros:n(1,20)},{nome:'Rep. Tcheca',prefixo:'CZE',numeros:n(1,20)}]},
  {grupo:'Grupo B',secoes:[{nome:'Canadá',prefixo:'CAN',numeros:n(1,20)},{nome:'Bósnia',prefixo:'BIH',numeros:n(1,20)},{nome:'Catar',prefixo:'QAT',numeros:n(1,20)},{nome:'Suíça',prefixo:'SUI',numeros:n(1,20)}]},
  {grupo:'Grupo C',secoes:[{nome:'Brasil',prefixo:'BRA',numeros:n(1,20)},{nome:'Marrocos',prefixo:'MAR',numeros:n(1,20)},{nome:'Haiti',prefixo:'HAI',numeros:n(1,20)},{nome:'Escócia',prefixo:'SCO',numeros:n(1,20)}]},
  {grupo:'Grupo D',secoes:[{nome:'Estados Unidos',prefixo:'USA',numeros:n(1,20)},{nome:'Paraguai',prefixo:'PAR',numeros:n(1,20)},{nome:'Austrália',prefixo:'AUS',numeros:n(1,20)},{nome:'Turquia',prefixo:'TUR',numeros:n(1,20)}]},
  {grupo:'Grupo E',secoes:[{nome:'Alemanha',prefixo:'GER',numeros:n(1,20)},{nome:'Curaçao',prefixo:'CUW',numeros:n(1,20)},{nome:'Costa do Marfim',prefixo:'CIV',numeros:n(1,20)},{nome:'Equador',prefixo:'ECU',numeros:n(1,20)}]},
  {grupo:'Grupo F',secoes:[{nome:'Holanda',prefixo:'NED',numeros:n(1,20)},{nome:'Japão',prefixo:'JPN',numeros:n(1,20)},{nome:'Suécia',prefixo:'SWE',numeros:n(1,20)},{nome:'Tunísia',prefixo:'TUN',numeros:n(1,20)}]},
  {grupo:'Grupo G',secoes:[{nome:'Bélgica',prefixo:'BEL',numeros:n(1,20)},{nome:'Egito',prefixo:'EGY',numeros:n(1,20)},{nome:'Irã',prefixo:'IRN',numeros:n(1,20)},{nome:'Nova Zelândia',prefixo:'NZL',numeros:n(1,20)}]},
  {grupo:'Grupo H',secoes:[{nome:'Espanha',prefixo:'ESP',numeros:n(1,20)},{nome:'Cabo Verde',prefixo:'CPV',numeros:n(1,20)},{nome:'Arábia Saudita',prefixo:'KSA',numeros:n(1,20)},{nome:'Uruguai',prefixo:'URU',numeros:n(1,20)}]},
  {grupo:'Grupo I',secoes:[{nome:'França',prefixo:'FRA',numeros:n(1,20)},{nome:'Senegal',prefixo:'SEN',numeros:n(1,20)},{nome:'Iraque',prefixo:'IRQ',numeros:n(1,20)},{nome:'Noruega',prefixo:'NOR',numeros:n(1,20)}]},
  {grupo:'Grupo J',secoes:[{nome:'Argentina',prefixo:'ARG',numeros:n(1,20)},{nome:'Argélia',prefixo:'ALG',numeros:n(1,20)},{nome:'Áustria',prefixo:'AUT',numeros:n(1,20)},{nome:'Jordânia',prefixo:'JOR',numeros:n(1,20)}]},
  {grupo:'Grupo K',secoes:[{nome:'Portugal',prefixo:'POR',numeros:n(1,20)},{nome:'Congo',prefixo:'COD',numeros:n(1,20)},{nome:'Uzbequistão',prefixo:'UZB',numeros:n(1,20)},{nome:'Colômbia',prefixo:'COL',numeros:n(1,20)}]},
  {grupo:'Grupo L',secoes:[{nome:'Inglaterra',prefixo:'ENG',numeros:n(1,20)},{nome:'Croácia',prefixo:'CRO',numeros:n(1,20)},{nome:'Gana',prefixo:'GHA',numeros:n(1,20)},{nome:'Panamá',prefixo:'PAN',numeros:n(1,20)}]},
  {grupo:'Extras',secoes:[{nome:'FIFA World Cup History',prefixo:'FWC',numeros:n(9,19)},{nome:'Figurinhas da Coca-Cola',prefixo:'CC',numeros:n(1,14)}]}
];
const FLAGS={MEX:'mx',RSA:'za',KOR:'kr',CZE:'cz',CAN:'ca',BIH:'ba',QAT:'qa',SUI:'ch',BRA:'br',MAR:'ma',HAI:'ht',SCO:'gb-sct',USA:'us',PAR:'py',AUS:'au',TUR:'tr',GER:'de',CUW:'cw',CIV:'ci',ECU:'ec',NED:'nl',JPN:'jp',SWE:'se',TUN:'tn',BEL:'be',EGY:'eg',IRN:'ir',NZL:'nz',ESP:'es',CPV:'cv',KSA:'sa',URU:'uy',FRA:'fr',SEN:'sn',IRQ:'iq',NOR:'no',ARG:'ar',ALG:'dz',AUT:'at',JOR:'jo',POR:'pt',COD:'cd',UZB:'uz',COL:'co',ENG:'gb-eng',CRO:'hr',GHA:'gh',PAN:'pa'};
const GROUP_COLORS=['#155eef','#7a5af8','#dd2590','#eaaa08','#12b76a','#06aed4','#f79009','#f04438','#6172f3','#9e77ed','#17b26a','#2e90fa','#667085','#344054'];
const STORAGE_KEY='figurinhas-copa-2026-mobile-v4';
const saved=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
const state=new Set(saved);
const openTeams=new Set();
const stickers=GRUPOS.flatMap((g,ordemGrupo)=>g.secoes.flatMap((s,ordemSecao)=>s.numeros.map((numero,ordem)=>({id:`${s.prefixo}-${numero}`,grupo:g.grupo,secao:s.nome,prefixo:s.prefixo,numero,ordemGrupo,ordemSecao,ordem}))));
let activeGroup='Todos';
const $=id=>document.getElementById(id);
const stickerLabel=x=>`${x.prefixo}${x.numero}`;
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function norm(v){return String(v||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}
function flagHtml(prefixo){const code=FLAGS[prefixo];return code?`<img class="flag" src="https://flagcdn.com/${code}.svg" alt="Bandeira ${prefixo}" loading="lazy">`:`<span class="flag placeholder">★</span>`}
function groupColor(grupo){const i=GRUPOS.findIndex(g=>g.grupo===grupo);return GROUP_COLORS[Math.max(0,i)%GROUP_COLORS.length]}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify([...state]));updateStats();renderTabs()}
function isDone(id){return state.has(id)}
function setDone(id,done){done?state.add(id):state.delete(id)}
function confirmBatch(msg){return confirm(msg||'Confirmar alteração em várias figurinhas?')}
function itemMatches(x,q){return !q||norm(x.grupo).includes(q)||norm(x.secao).includes(q)||norm(x.prefixo).includes(q)||norm(x.numero).includes(q)||norm(x.id).includes(q)||norm(`${x.prefixo} ${x.numero}`).includes(q)||norm(stickerLabel(x)).includes(q)}
function filteredItems(){const q=norm($('q').value);return stickers.filter(x=>(activeGroup==='Todos'||x.grupo===activeGroup)&&itemMatches(x,q))}
function allVisibleTeamKeys(){const q=norm($('q').value);const items=filteredItems();return GRUPOS.flatMap(g=>g.secoes.map(sec=>({g,sec}))).filter(({g,sec})=>(activeGroup==='Todos'||g.grupo===activeGroup)&&items.some(x=>x.grupo===g.grupo&&x.secao===sec.nome)).map(({g,sec})=>`${g.grupo}|${sec.prefixo}`)}
function renderTabs(){const tabs=['Todos',...GRUPOS.map(g=>g.grupo)];$('tabs').innerHTML=tabs.map(t=>`<button class="tab ${t===activeGroup?'active':''}" data-g="${esc(t)}">${esc(t)}</button>`).join('');document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{activeGroup=b.dataset.g;render();window.scrollTo({top:0,behavior:'smooth'})})}
function render(){renderTabs();document.querySelectorAll('details.team').forEach(d=>{if(d.open)openTeams.add(d.dataset.key);else openTeams.delete(d.dataset.key)});const album=$('album');const q=norm($('q').value);album.innerHTML='';const itemsNow=filteredItems();const groups=GRUPOS.filter(g=>activeGroup==='Todos'||g.grupo===activeGroup);let shown=0;groups.forEach(g=>{const groupItems=itemsNow.filter(x=>x.grupo===g.grupo);if(!groupItems.length)return;shown+=groupItems.length;const gd=groupItems.filter(x=>isDone(x.id)).length;const head=document.createElement('div');head.className='group-head';head.style.borderLeft=`8px solid ${groupColor(g.grupo)}`;head.style.background=`linear-gradient(90deg, ${groupColor(g.grupo)}18, transparent)`;head.innerHTML=`<h2>${esc(g.grupo)} <span class="badge">${gd}/${groupItems.length}</span></h2><div class="group-actions"><button class="mini" data-a="mark">Marcar</button><button class="mini" data-a="clear">Limpar</button></div>`;head.querySelector('[data-a="mark"]').onclick=()=>{if(!confirmBatch(`Marcar todas as ${groupItems.length} figurinhas de ${g.grupo}?`))return;groupItems.forEach(x=>setDone(x.id,true));save();render()};head.querySelector('[data-a="clear"]').onclick=()=>{if(!confirmBatch(`Desmarcar todas as ${groupItems.length} figurinhas de ${g.grupo}?`))return;groupItems.forEach(x=>setDone(x.id,false));save();render()};album.appendChild(head);g.secoes.forEach(sec=>{const teamItems=groupItems.filter(x=>x.secao===sec.nome);if(!teamItems.length)return;const col=teamItems.filter(x=>isDone(x.id)).length;const key=`${g.grupo}|${sec.prefixo}`;const d=document.createElement('details');d.className='team';d.dataset.key=key;d.open=openTeams.has(key)||!!q||activeGroup!=='Todos'||g.grupo==='Página inicial';d.ontoggle=()=>{d.open?openTeams.add(key):openTeams.delete(key)};d.innerHTML=`<summary><span class="team-title">${flagHtml(sec.prefixo)}<span class="team-name">${esc(sec.nome)}<small>${esc(sec.prefixo)}</small></span></span><span class="badge">${col}/${teamItems.length}</span></summary>`;const actions=document.createElement('div');actions.className='team-actions';actions.innerHTML='<button>Marcar seção</button><button>Limpar seção</button>';actions.children[0].onclick=()=>{if(!confirmBatch(`Marcar todas as ${teamItems.length} figurinhas de ${sec.nome}?`))return;teamItems.forEach(x=>setDone(x.id,true));save();render()};actions.children[1].onclick=()=>{if(!confirmBatch(`Desmarcar todas as ${teamItems.length} figurinhas de ${sec.nome}?`))return;teamItems.forEach(x=>setDone(x.id,false));save();render()};d.appendChild(actions);const grid=document.createElement('div');grid.className='grid';teamItems.forEach(x=>{const b=document.createElement('button');b.className='sticker'+(isDone(x.id)?' done':'');b.innerHTML=`${esc(stickerLabel(x))}<small>${isDone(x.id)?'colada':'faltante'}</small>`;b.onclick=()=>{setDone(x.id,!isDone(x.id));save();render()};grid.appendChild(b)});d.appendChild(grid);album.appendChild(d)})});if(!shown)album.innerHTML='<div class="empty-msg">Nenhuma figurinha encontrada.</div>';updateStats()}
function updateStats(){const done=stickers.filter(x=>isDone(x.id)).length;const pct=Math.round(done/stickers.length*100);$('total').textContent=stickers.length;$('done').textContent=done;$('missing').textContent=stickers.length-done;$('pct').textContent=pct+'%';$('progressPill').textContent=pct+'% completo'}
function exportCsv(){const rows=[['id','grupo','secao','prefixo','numero','colada'],...stickers.map(x=>[x.id,x.grupo,x.secao,x.prefixo,x.numero,isDone(x.id)?1:0])];const csv=rows.map(r=>r.map(v=>'"'+String(v).replaceAll('"','""')+'"').join(',')).join('\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='figurinhas-copa-2026.csv';a.click();URL.revokeObjectURL(a.href)}
function parseLine(line){const out=[];let cur='',quoted=false;for(let i=0;i<line.length;i++){const ch=line[i],nx=line[i+1];if(ch==='"'&&quoted&&nx==='"'){cur+='"';i++}else if(ch==='"')quoted=!quoted;else if((ch===','||ch===';')&&!quoted){out.push(cur.trim());cur=''}else cur+=ch}out.push(cur.trim());return out.map(v=>v.replace(/^"|"$/g,'').replaceAll('""','"'))}
function importCsv(text){if(!confirmBatch('Importar CSV pode marcar ou desmarcar várias figurinhas. Continuar?'))return;const lines=text.split(/\r?\n/).filter(x=>x.trim());if(!lines.length)return;const h=parseLine(lines.shift()).map(norm);const id=h.indexOf('id'),pre=h.indexOf('prefixo'),num=h.indexOf('numero'),col=h.indexOf('colada');lines.forEach(line=>{const c=parseLine(line);let sid=id>=0?c[id]:'';if(!sid&&pre>=0&&num>=0)sid=`${c[pre]}-${c[num]}`;if(!stickers.some(x=>x.id===sid))return;setDone(sid,['1','sim','s','true','x','colada','yes','y'].includes(norm(c[col])))});save();render()}
function quickMark(){const txt=$('quick').value;const tokens=txt.split(/[,;\n]+/).map(x=>x.trim()).filter(Boolean);let count=0;tokens.forEach(t=>{const m=t.match(/^([a-zA-Z]{2,4})\s*-?\s*(\d{1,2})$/);if(!m)return;const sid=`${m[1].toUpperCase()}-${Number(m[2])}`;const item=stickers.find(x=>x.id===sid||`${x.prefixo}-${Number(x.numero)}`===sid);if(item){setDone(item.id,true);count++}});$('quick').value='';save();render();alert(count?`${count} figurinha(s) marcada(s).`:'Nenhuma figurinha encontrada. Exemplo: BRA1, FWC8')}
function buildPrint(){const html=GRUPOS.map(g=>`<div class="print-group">${esc(g.grupo)}</div>`+g.secoes.map(sec=>{const miss=stickers.filter(x=>x.grupo===g.grupo&&x.secao===sec.nome&&!isDone(x.id)).map(x=>stickerLabel(x));return `<div class="print-row"><div class="print-team">${esc(sec.nome)}</div><div class="print-missing ${miss.length?'':'empty'}">${miss.length?esc(miss.join(' ')):'Completa'}</div></div>`}).join('')).join('');$('printArea').innerHTML=`<div class="print-title">Figurinhas faltantes — Copa 2026</div><p class="print-sub">Ordem por grupos. Gerado em ${new Date().toLocaleDateString('pt-BR')}.</p>${html}`}
$('q').oninput=render;$('quickBtn').onclick=quickMark;$('quick').addEventListener('keydown',e=>{if(e.key==='Enter')quickMark()});$('exportCsv').onclick=exportCsv;$('importCsv').onchange=e=>{const f=e.target.files[0];if(f)f.text().then(importCsv);e.target.value=''};$('printMissing').onclick=()=>{buildPrint();window.print()};$('toggleSections').onclick=()=>{const keys=allVisibleTeamKeys();const shouldOpen=keys.some(k=>!openTeams.has(k));if(shouldOpen)keys.forEach(k=>openTeams.add(k));else keys.forEach(k=>openTeams.delete(k));render()};$('moreBtn').onclick=()=>{const a=prompt('Digite: 1 para marcar tudo, 2 para limpar tudo');if(a==='1'){if(!confirmBatch(`Marcar todas as ${stickers.length} figurinhas?`))return;stickers.forEach(x=>setDone(x.id,true));save();render()}if(a==='2'){if(!confirmBatch('Desmarcar todas as figurinhas?'))return;state.clear();save();render()}};
render();
</script>
</body>
</html>
